<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить товар | Админ-панель Клик-Клав</title>
    <style>
        @font-face { font-family:"igra"; src:url("../fonts/IgraSans.otf"); }
        @font-face { font-family:"inter"; src:url("../fonts/Inter-Light.otf"); }
        body { margin:0; }
        .admin *,.admin *::before,.admin *::after { box-sizing:border-box;margin:0;padding:0;transition:none;font-family:"igra",sans-serif; }
        .admin { display:flex;min-height:100vh;background:#f5f5f5;color:#111;line-height:1.4; }
        .admin__sidebar { width:260px;background:#000;color:#fff;display:flex;flex-direction:column;padding:30px 20px;gap:8px;flex-shrink:0; }
        .admin__sidebar-logo { font-family:'igra',sans-serif;font-size:28px;text-align:center;margin-bottom:20px;letter-spacing:2px; }
        .admin__sidebar-logo span { display:block;font-size:12px;font-family:'inter',sans-serif;color:#888;margin-top:4px; }
        .admin__sidebar-link { color:#aaa;text-decoration:none;padding:12px 16px;border-radius:8px;font-size:16px;display:flex;align-items:center;gap:12px;font-family:'inter',sans-serif; }
        .admin__sidebar-link:hover,.admin__sidebar-link.active { background:#1a1a1a;color:#fff; }
        .admin__sidebar-link.logout { margin-top:auto;color:#aaa; }
        .admin__sidebar-link.logout:hover { background:#1a1a1a;color:#fff; }
        .admin__main { flex:1;padding:40px;overflow-y:auto;display:flex;flex-direction:column;gap:30px; }
        .admin__header { display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px; }
        .admin__title { font-family:'igra',sans-serif;font-size:36px;font-weight:400; }
        .admin__breadcrumbs { color:#888;font-size:14px;font-family:'inter',sans-serif; }
        .admin__breadcrumbs a { color:#000;text-decoration:none; }
        .admin__btn { background:#000;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-family:'igra',sans-serif;font-size:16px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px; }
        .admin__btn:hover { background:#1a1a1a; }
        .admin__btn-outline { background:#fff;color:#000;border:2px solid #000; }
        .admin__btn-outline:hover { background:#000;color:#fff; }
        .admin__btn-outline img { filter:invert(0);transition:filter 0.2s; }
        .admin__btn-outline:hover img { filter:invert(1); }
        .admin__btn-sm { padding:8px 16px;font-size:14px; }
        .admin__btn-danger { background:#000; }
        .admin__btn-danger:hover { background:#333; }
        .admin__form { background:#fff;border-radius:12px;padding:30px;box-shadow:0 2px 10px rgba(0,0,0,.05);border:1px solid #eee;display:flex;flex-direction:column;gap:20px;max-width:680px; }
        .admin__form-group { display:flex;flex-direction:column;gap:6px; }
        .admin__form-label { font-size:14px;font-weight:600;color:#333;font-family:'inter',sans-serif; }
        .admin__form-input,.admin__form-select,.admin__form-textarea { padding:12px 16px;border:1px solid #ddd;border-radius:8px;font-size:16px;font-family:'inter',sans-serif;outline:none; }
        .admin__form-input:focus,.admin__form-select:focus,.admin__form-textarea:focus { border-color:#000; }
        .admin__form-textarea { resize:vertical;min-height:120px; }
        .admin__form-actions { display:flex;gap:12px;flex-wrap:wrap; }
        @media(max-width:428px){.admin{flex-direction:column}.admin__sidebar{width:100%;flex-direction:row;flex-wrap:wrap;padding:16px 12px;gap:6px;justify-content:center}.admin__main{padding:20px 16px}}
    </style>
</head>
<body>
<div class="admin">
    <aside class="admin__sidebar">
        <div class="admin__sidebar-logo">КЛИК-КЛАВ<span>админ-панель</span></div>
        <a href="admin.html" class="admin__sidebar-link">Главная</a>
        <a href="admin-products.html" class="admin__sidebar-link">Товары</a>
        <a href="admin-categories.html" class="admin__sidebar-link">Категории</a>
        <a href="admin-orders.html" class="admin__sidebar-link">Заказы</a>
        <a href="../index.html" class="admin__sidebar-link logout">Выйти</a>
    </aside>

    <main class="admin__main">
        <div class="admin__header">
            <div>
                <h1 class="admin__title">Добавить товар</h1>
                <p class="admin__breadcrumbs">
                    <a href="admin.html">Админ-панель</a> › <a href="admin-products.html">Товары</a> › Добавить
                </p>
            </div>
        </div>

        <form class="admin__form" id="productForm">
            <div class="admin__form-group">
                <label class="admin__form-label">Название *</label>
                <input type="text" name="name" class="admin__form-input" placeholder="Введите название" required>
            </div>
            <div class="admin__form-group">
                <label class="admin__form-label">Бренд</label>
                <input type="text" name="brand" class="admin__form-input" placeholder="Например: Logitech">
            </div>
            <div class="admin__form-group">
                <label class="admin__form-label">Категория *</label>
                <select name="category_id" class="admin__form-select" required>
                    <option value="">Выберите категорию</option>
                </select>
            </div>
            <div class="admin__form-group">
                <label class="admin__form-label">Цена (₽) *</label>
                <input type="number" name="price" class="admin__form-input" placeholder="10990" min="0" required>
            </div>
            <div class="admin__form-group">
                <label class="admin__form-label">Количество на складе</label>
                <input type="number" name="stock" class="admin__form-input" placeholder="0" value="0" min="0">
            </div>
            <div class="admin__form-group">
                <label class="admin__form-label">Бейдж (необязательно)</label>
                <input type="text" name="badge" class="admin__form-input" placeholder="Новинка / Хит">
            </div>
            <div class="admin__form-group">
                <label class="admin__form-label">Описание</label>
                <textarea name="description" class="admin__form-textarea" placeholder="Описание товара"></textarea>
            </div>
            <div class="admin__form-group">
                <label class="admin__form-label">Изображения товара</label>
                <div id="imagePreviewContainer" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;min-height:20px;"></div>
                <div style="display:flex;gap:8px;">
                    <input type="text" id="newImagePath" class="admin__form-input" placeholder="/public/clava.png" style="flex:1;">
                    <button type="button" id="addImageBtn" class="admin__btn admin__btn-sm">+ Добавить</button>
                </div>
                <p style="font-size:12px;color:#888;margin-top:4px;">Введите путь к файлу, например: /public/clava.png</p>
            </div>
            <div class="admin__form-actions">
                <button type="submit" class="admin__btn">Добавить товар</button>
                <a href="admin-products.html" class="admin__btn admin__btn-outline">Отмена</a>
            </div>
        </form>
    </main>
</div>
<script src="../js/api.js"></script>
<script src="../js/admin.js"></script>
<script src="../js/admin-add-product.js"></script>
</body>
</html>
